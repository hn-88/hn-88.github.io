<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GitHub Traffic Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,600;9..144,900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f6f8fa;
    --surface: #ffffff;
    --surface2: #f6f8fa;
    --border: #d0d7de;
    --accent: #1a7f37;
    --accent2: #0969da;
    --accent3: #cf222e;
    --text: #1f2328;
    --muted: #57606a;
    --muted2: #57606a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .wrap { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 24px; }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding: 48px 0 36px;
    margin-bottom: 48px;
  }

  .header-inner { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 20px; }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2.4rem, 5vw, 4rem);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  h1 em {
    font-style: normal;
    color: var(--accent2);
    display: block;
  }

  .meta {
    text-align: right;
    color: var(--muted2);
    line-height: 1.8;
  }

  .meta strong { color: var(--accent2); }

  /* Summary cards */
  .summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 2px;
    margin-bottom: 48px;
    overflow: hidden;
  }

  .summary-card {
    background: var(--surface);
    padding: 24px 20px;
    text-align: center;
  }

  .summary-card .val {
    font-family: 'Fraunces', serif;
    font-size: 2.4rem;
    font-weight: 600;
    color: var(--accent2);
    display: block;
    line-height: 1;
    margin-bottom: 6px;
  }

  .summary-card .lbl {
    color: var(--muted2);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Sort bar */
  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .controls span { color: var(--muted2); margin-right: 4px; }

  .sort-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted2);
    padding: 5px 12px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: all 0.15s;
    border-radius: 2px;
  }

  .sort-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .sort-btn.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  /* Search */
  .search-wrap { margin-left: auto; }
  #search {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    width: 200px;
    outline: none;
    border-radius: 2px;
    transition: border-color 0.15s;
  }
  #search:focus { border-color: var(--accent2); }
  #search::placeholder { color: var(--muted2); }

  /* Repo grid */
  #repos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 60px;
  }

  .repo-card {
    background: var(--surface);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .repo-card:hover { background: var(--surface2); }

  .repo-card::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--accent2);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .repo-card:hover::after { opacity: 1; }

  .repo-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }

  .repo-name {
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text);
    text-decoration: none;
    flex: 1;
  }
  .repo-name:hover { color: var(--accent2); }

  .lang-badge {
    font-size: 10px;
    padding: 2px 8px;
    border: 1px solid var(--border);
    color: var(--muted2);
    white-space: nowrap;
    border-radius: 20px;
    flex-shrink: 0;
  }

  .repo-desc {
    color: var(--muted2);
    font-size: 12px;
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Stat row */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .stat-box { background: var(--bg); padding: 10px 8px; text-align: center; }
  .stat-box .n { display: block; font-size: 1.15rem; font-weight: 500; color: var(--accent2); }
  .stat-box.blue .n { color: #6639ba; }
  .stat-box.pink .n { color: var(--accent3); }
  .stat-box.gold .n { color: #9a6700; }
  .stat-box .l { display: block; font-size: 10px; color: var(--muted2); margin-top: 2px; letter-spacing: 0.05em; }

  /* Sparkline */
  .sparkline-wrap { position: relative; height: 40px; }
  .sparkline-wrap svg { width: 100%; height: 100%; }

  /* Expanded panel */
  .repo-detail {
    display: none;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-top: none;
    padding: 24px;
    margin-top: -1px;
  }
  .repo-detail.open { display: block; }
  .detail-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .detail-section h3 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted2);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .ref-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .ref-row:last-child { border-bottom: none; }
  .ref-row .ref-url { color: var(--accent2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; margin-right: 12px; }
  .ref-row .ref-count { color: var(--accent); white-space: nowrap; }
  .ref-row .ref-uniq { color: var(--muted2); white-space: nowrap; margin-left: 8px; }

  /* Loading / error */
  #loading, #error {
    text-align: center;
    padding: 80px 0;
    color: var(--muted2);
    font-size: 1rem;
  }
  #error { color: var(--accent3); }

  /* Footer */
  footer {
    border-top: 1px solid var(--border);
    padding: 24px 0;
    color: var(--muted2);
    font-size: 11px;
    text-align: center;
  }

  @media (max-width: 600px) {
    .detail-cols { grid-template-columns: 1fr; }
    #repos-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="header-inner">
      <h1>GitHub <em>Traffic</em></h1>
      <div class="meta" id="header-meta">Loading...</div>
    </div>
  </header>

  <div class="summary" id="summary" style="display:none">
    <div class="summary-card"><span class="val" id="s-repos">—</span><span class="lbl">Repos</span></div>
    <div class="summary-card"><span class="val" id="s-views">—</span><span class="lbl">Total Views (14d)</span></div>
    <div class="summary-card"><span class="val" id="s-uniq">—</span><span class="lbl">Unique Visitors (14d)</span></div>
    <div class="summary-card"><span class="val" id="s-clones">—</span><span class="lbl">Total Clones (14d)</span></div>
    <div class="summary-card"><span class="val" id="s-stars">—</span><span class="lbl">Total Stars</span></div>
  </div>

  <div class="controls" id="controls" style="display:none">
    <span>Sort by:</span>
    <button class="sort-btn active" data-sort="views">Views</button>
    <button class="sort-btn" data-sort="uniques">Unique Visitors</button>
    <button class="sort-btn" data-sort="clones">Clones</button>
    <button class="sort-btn" data-sort="stars">Stars</button>
    <button class="sort-btn" data-sort="name">Name</button>
    <div class="search-wrap">
      <input id="search" type="text" placeholder="Filter repos…" />
    </div>
  </div>

  <div id="loading">Loading stats…</div>
  <div id="error" style="display:none"></div>
  <div id="repos-grid"></div>
</div>

<footer>
  <div class="wrap">Auto-updated daily via GitHub Actions &mdash; data from GitHub Traffic API (14-day window)<br><br>
  <a href="https://github.com/hn-88/hn-88.github.io/blob/master/stats/prompt.md" target="_blank" rel="noopener" style="color:var(--accent2);text-decoration:none;">Prompt used to generate this page</a>
  </div>
</footer>

<script>
let allRepos = [];
let currentSort = 'views';
let expandedCard = null;

function fmt(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return String(n);
}

function sparkline(dailyArr, colorVar) {
  if (!dailyArr || dailyArr.length === 0) return '';
  const vals = dailyArr.map(d => d.count);
  const max = Math.max(...vals, 1);
  const w = 200, h = 36, pad = 2;
  const step = (w - pad*2) / Math.max(vals.length - 1, 1);
  const pts = vals.map((v, i) => {
    const x = pad + i * step;
    const y = h - pad - ((v / max) * (h - pad*2));
    return `${x},${y}`;
  }).join(' ');
  const fill = vals.map((v, i) => {
    const x = pad + i * step;
    const y = h - pad - ((v / max) * (h - pad*2));
    return `${x},${y}`;
  });
  const fillPath = `M ${pad},${h - pad} ` + fill.map(p => `L ${p}`).join(' ') + ` L ${w - pad},${h - pad} Z`;
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="sg${colorVar}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(${colorVar})" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="var(${colorVar})" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="${fillPath}" fill="url(#sg${colorVar})"/>
    <polyline points="${pts}" fill="none" stroke="var(${colorVar})" stroke-width="1.5"/>
  </svg>`;
}

function renderRepos(repos) {
  const grid = document.getElementById('repos-grid');
  grid.innerHTML = '';

  if (repos.length === 0) {
    grid.innerHTML = '<div style="padding:40px;color:var(--muted2);text-align:center;grid-column:1/-1">No repos match your search.</div>';
    return;
  }

  repos.forEach((repo, idx) => {
    const views = repo.views?.count ?? 0;
    const uniques = repo.views?.uniques ?? 0;
    const clones = repo.clones?.count ?? 0;
    const clonesUniq = repo.clones?.uniques ?? 0;
    const viewsDailyArr = repo.views?.views ?? [];
    const clonesDailyArr = repo.clones?.clones ?? [];

    const card = document.createElement('div');
    card.className = 'repo-card';
    card.dataset.idx = idx;

    card.innerHTML = `
      <div class="repo-header">
        <a class="repo-name" href="${repo.html_url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${repo.name}</a>
        <span class="lang-badge">${repo.language}</span>
      </div>
      ${repo.description ? `<div class="repo-desc">${repo.description}</div>` : ''}
      <div class="sparkline-wrap" title="Views (14 days)">${sparkline(viewsDailyArr, '--accent2')}</div>
      <div class="stats-row">
        <div class="stat-box"><span class="n">${fmt(views)}</span><span class="l">Views</span></div>
        <div class="stat-box blue"><span class="n">${fmt(uniques)}</span><span class="l">Visitors</span></div>
        <div class="stat-box pink"><span class="n">${fmt(clones)}</span><span class="l">Clones</span></div>
        <div class="stat-box gold"><span class="n">${fmt(repo.stars)}</span><span class="l">★ Stars</span></div>
      </div>
    `;

    const detail = document.createElement('div');
    detail.className = 'repo-detail';
    detail.dataset.for = idx;

    const refRows = (repo.referrers || []).map(r =>
      `<div class="ref-row">
        <span class="ref-url">${r.referrer}</span>
        <span class="ref-count">${fmt(r.count)} views</span>
        <span class="ref-uniq">${fmt(r.uniques)} uniq</span>
       </div>`
    ).join('') || '<div class="ref-row"><span class="ref-url" style="color:var(--muted2)">No data</span></div>';

    const pathRows = (repo.paths || []).map(p =>
      `<div class="ref-row">
        <span class="ref-url">${p.path}</span>
        <span class="ref-count">${fmt(p.count)}</span>
        <span class="ref-uniq">${fmt(p.uniques)} uniq</span>
       </div>`
    ).join('') || '<div class="ref-row"><span class="ref-url" style="color:var(--muted2)">No data</span></div>';

    detail.innerHTML = `
      <div class="detail-cols">
        <div class="detail-section">
          <h3>Top Referrers</h3>
          ${refRows}
        </div>
        <div class="detail-section">
          <h3>Popular Paths</h3>
          ${pathRows}
        </div>
      </div>
      <div style="margin-top:16px">
        <div style="font-size:10px;color:var(--muted2);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px">Clone Activity (14 days)</div>
        <div style="height:40px">${sparkline(clonesDailyArr, '--accent3')}</div>
      </div>
    `;

    card.addEventListener('click', () => {
      const isOpen = detail.classList.contains('open');
      // close all
      document.querySelectorAll('.repo-detail.open').forEach(d => d.classList.remove('open'));
      if (!isOpen) detail.classList.add('open');
    });

    grid.appendChild(card);
    grid.appendChild(detail);
  });
}

function getSortedFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  let repos = allRepos.filter(r => r.name.toLowerCase().includes(q) || (r.description||'').toLowerCase().includes(q));
  repos.sort((a, b) => {
    if (currentSort === 'views') return (b.views?.count ?? 0) - (a.views?.count ?? 0);
    if (currentSort === 'uniques') return (b.views?.uniques ?? 0) - (a.views?.uniques ?? 0);
    if (currentSort === 'clones') return (b.clones?.count ?? 0) - (a.clones?.count ?? 0);
    if (currentSort === 'stars') return (b.stars ?? 0) - (a.stars ?? 0);
    if (currentSort === 'name') return a.name.localeCompare(b.name);
    return 0;
  });
  return repos;
}

function refresh() {
  renderRepos(getSortedFiltered());
}

async function init() {
  try {
    const resp = await fetch('stats.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    allRepos = data.repos;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('summary').style.display = '';
    document.getElementById('controls').style.display = '';

    const genDate = new Date(data.generated_at);
    document.getElementById('header-meta').innerHTML =
      `<strong>@${data.username}</strong><br>${data.repos.length} public repos<br>Updated ${genDate.toLocaleDateString(undefined, {month:'short',day:'numeric',year:'numeric'})}`;

    const totalViews = allRepos.reduce((s,r) => s + (r.views?.count ?? 0), 0);
    const totalUniq  = allRepos.reduce((s,r) => s + (r.views?.uniques ?? 0), 0);
    const totalClone = allRepos.reduce((s,r) => s + (r.clones?.count ?? 0), 0);
    const totalStars = allRepos.reduce((s,r) => s + (r.stars ?? 0), 0);

    document.getElementById('s-repos').textContent = fmt(allRepos.length);
    document.getElementById('s-views').textContent = fmt(totalViews);
    document.getElementById('s-uniq').textContent  = fmt(totalUniq);
    document.getElementById('s-clones').textContent= fmt(totalClone);
    document.getElementById('s-stars').textContent = fmt(totalStars);

    refresh();

    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSort = btn.dataset.sort;
        refresh();
      });
    });

    document.getElementById('search').addEventListener('input', refresh);

  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = `Failed to load stats.json — ${e.message}. Make sure the GitHub Action has run at least once.`;
  }
}

init();
</script>
</body>
</html>
