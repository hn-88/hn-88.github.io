name: Fetch GitHub Traffic Stats

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:       # Allow manual runs

permissions:
  contents: write

jobs:
  fetch-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch traffic stats and generate dashboard
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
        run: |
          python3 - <<'EOF'
          import urllib.request
          import urllib.error
          import json
          import os
          import datetime

          token = os.environ["GH_TOKEN"]
          username = os.environ["GH_USERNAME"]

          headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github.v3+json",
              "User-Agent": "github-stats-dashboard"
          }

          def api_get(url):
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req) as resp:
                      return json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  print(f"  HTTPError {e.code} for {url}")
                  return None

          def paginate(url):
              results = []
              page = 1
              while True:
                  data = api_get(f"{url}?per_page=100&page={page}")
                  if not data:
                      break
                  results.extend(data)
                  if len(data) < 100:
                      break
                  page += 1
              return results

          print("Fetching public repositories...")
          repos = paginate(f"https://api.github.com/users/{username}/repos")
          repos = [r for r in repos if not r["private"]]
          repos.sort(key=lambda r: r.get("stargazers_count", 0), reverse=True)
          print(f"Found {len(repos)} public repos")

          stats = []
          for repo in repos:
              name = repo["name"]
              print(f"  Processing {name}...")

              views_data = api_get(f"https://api.github.com/repos/{username}/{name}/traffic/views")
              clones_data = api_get(f"https://api.github.com/repos/{username}/{name}/traffic/clones")
              referrers = api_get(f"https://api.github.com/repos/{username}/{name}/traffic/popular/referrers") or []
              paths = api_get(f"https://api.github.com/repos/{username}/{name}/traffic/popular/paths") or []

              stats.append({
                  "name": name,
                  "description": repo.get("description") or "",
                  "stars": repo.get("stargazers_count", 0),
                  "forks": repo.get("forks_count", 0),
                  "language": repo.get("language") or "N/A",
                  "html_url": repo.get("html_url", ""),
                  "updated_at": repo.get("updated_at", ""),
                  "views": views_data if views_data else {"count": 0, "uniques": 0, "views": []},
                  "clones": clones_data if clones_data else {"count": 0, "uniques": 0, "clones": []},
                  "referrers": referrers[:5],
                  "paths": paths[:5],
              })

          output = {
              "username": username,
              "generated_at": datetime.datetime.utcnow().isoformat() + "Z",
              "repos": stats
          }

          os.makedirs("docs", exist_ok=True)
          with open("docs/stats.json", "w") as f:
              json.dump(output, f, indent=2)
          print("Saved docs/stats.json")
          EOF

      - name: Copy dashboard HTML
        run: |
          cp stats.html docs/index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: update traffic stats $(date -u +%Y-%m-%d)"
          git push
